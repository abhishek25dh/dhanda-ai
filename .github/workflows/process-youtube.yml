name: Process YouTube scripts

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Set up Deno for yt-dlp
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install media tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          python3 -m pip install --upgrade yt-dlp --break-system-packages

      - name: Process latest channel uploads
        working-directory: backend
        env:
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          DHANDA_API_BASE: ${{ vars.DHANDA_API_BASE }}
          DHANDA_ADMIN_API_KEY: ${{ secrets.DHANDA_ADMIN_API_KEY }}
          TRANSCRIPT_MODE: captions
        run: npm run process:channel
